<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>이음</title>
<style>
  :root{
    --bg:#ECEEE9; --backdrop:#D9DDD4; --panel:#FFFFFF; --ink:#23261F; --sub:#838B7C; --faint:#AAB0A2;
    --line:#E3E6DD; --accent:#E8654B; --accentSoft:#FCE7E1; --accentDim:#E7B6AC; --ok:#3F9D6B;
  }
  *{box-sizing:border-box;-webkit-text-size-adjust:100%;}
  html,body{margin:0;height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic","Segoe UI",sans-serif;color:var(--ink);background:var(--backdrop);}
  button{cursor:pointer;border:none;background:none;font:inherit;color:inherit;}
  input,textarea{font:inherit;outline:none;border:none;}
  ::placeholder{color:#A9B0A0;}
  #app{height:100vh;height:100dvh;display:flex;justify-content:center;overflow:hidden;}
  .app{width:100%;max-width:430px;height:100%;background:var(--bg);display:flex;flex-direction:column;box-shadow:0 0 50px rgba(0,0,0,.07);position:relative;overflow:hidden;}
  .sc::-webkit-scrollbar{width:8px;} .sc::-webkit-scrollbar-thumb{background:#D3D8CE;border-radius:8px;}
  button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  .scroll{flex:1;min-height:0;overflow-y:auto;padding:4px 14px 20px;}
  .hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;background:var(--bg);}
  .hdr-l{display:flex;align-items:baseline;gap:9px;}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);display:inline-block;transform:translateY(-1px);}
  .dot.big{width:12px;height:12px;transform:none;}
  .title{margin:0;font-size:22px;font-weight:800;letter-spacing:-.5px;}
  .av{border-radius:50%;display:flex;align-items:center;justify-content:center;flex:0 0 auto;user-select:none;line-height:1;}
  .icon-btn{border-radius:50%;display:flex;}

  .btn{border-radius:999px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;padding:11px 18px;font-size:15px;transition:opacity .15s,background .15s,transform .06s;}
  .btn:active{transform:scale(.97);}
  .btn-sm{padding:7px 14px;font-size:13px;}
  .btn-block{width:100%;padding:15px;font-size:16px;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-soft{background:var(--accentSoft);color:var(--accent);}
  .btn-line{background:transparent;color:var(--sub);border:1px solid var(--line);}
  .btn-ok{background:#E4F2EA;color:var(--ok);}
  .btn[disabled]{background:var(--accentDim);cursor:default;}

  .sect{font-size:12px;font-weight:800;color:var(--sub);margin:8px 4px 10px;letter-spacing:.2px;}
  .sect.accent{color:var(--accent);} .sect.faint{color:var(--faint);}

  .row{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:8px;width:100%;text-align:left;}
  .row-main{flex:1;min-width:0;}
  .name{font-weight:700;font-size:15px;color:var(--ink);}
  .sub{font-size:12.5px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .muted-tag{font-size:12px;color:var(--faint);}

  .mycard{display:flex;align-items:center;gap:12px;background:var(--accentSoft);border-radius:16px;padding:13px;margin-bottom:16px;}
  .tag-me{font-size:12px;font-weight:600;color:var(--accent);}

  .empty{text-align:center;color:var(--sub);font-size:13.5px;padding:30px 18px;line-height:1.8;}
  .empty.dashed{background:var(--panel);border:1px dashed var(--line);border-radius:16px;}
  .empty.dashed b{color:var(--ink);}
  .empty.plain{color:var(--faint);font-size:13px;padding:34px 16px;line-height:1.7;}

  .tabs{display:flex;border-top:1px solid var(--line);background:var(--panel);}
  .tab{flex:1;padding:10px 0 14px;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--faint);}
  .tab.active{color:var(--accent);}
  .tab-ic{position:relative;display:flex;}
  .tab .lab{font-size:11px;font-weight:700;}
  .badge{position:absolute;top:-4px;right:-8px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}

  .intro{padding:46px 24px 40px;}
  .intro-logo{display:flex;align-items:baseline;gap:11px;justify-content:center;margin-bottom:6px;}
  .logo{margin:0;font-size:38px;font-weight:800;letter-spacing:-1px;}
  .intro-sub{text-align:center;color:var(--sub);font-size:14px;margin:0 0 30px;}

  .form{display:flex;flex-direction:column;gap:20px;}
  .form-av-wrap{display:flex;justify-content:center;padding-top:4px;}
  .label{font-size:13px;font-weight:700;color:var(--sub);margin:0 0 8px 2px;}
  .opt{font-weight:500;color:var(--faint);}
  .field{width:100%;padding:13px 14px;border-radius:14px;border:1px solid var(--line);background:var(--panel);font-size:15px;color:var(--ink);}
  .emoji-grid{display:flex;flex-wrap:wrap;gap:8px;}
  .emoji{width:42px;height:42px;border-radius:12px;font-size:21px;display:flex;align-items:center;justify-content:center;background:var(--panel);border:1.5px solid var(--line);}
  .emoji.sel{background:var(--accentSoft);border-color:var(--accent);}
  .reset-link{align-self:center;color:var(--faint);font-size:13px;padding:6px;}

  .chat-hdr{display:flex;align-items:center;gap:11px;padding:12px;border-bottom:1px solid var(--line);background:var(--panel);}
  .chat-name{font-weight:700;font-size:16px;line-height:1.2;}
  .chat-status{font-size:12px;color:var(--faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .back{color:var(--ink);padding:4px;display:flex;}
  .msgs{flex:1;min-height:0;overflow-y:auto;padding:16px 14px 8px;background:var(--bg);}
  .msg-hint{text-align:center;color:var(--faint);font-size:13px;margin-top:30px;}
  .msg-row{display:flex;align-items:flex-end;gap:6px;margin:3px 0;}
  .msg-row.r{justify-content:flex-end;}
  .msg-row.l{justify-content:flex-start;}
  .bubble{max-width:74%;padding:10px 13px;border-radius:16px;font-size:15px;line-height:1.45;white-space:pre-wrap;word-break:break-word;background:var(--panel);color:var(--ink);border:1px solid var(--line);border-bottom-left-radius:5px;}
  .bubble.mine{background:var(--accent);color:#fff;border:none;border-bottom-left-radius:16px;border-bottom-right-radius:5px;}
  .time{font-size:10.5px;color:var(--faint);margin-bottom:2px;}
  .datechip-row{display:flex;justify-content:center;margin:12px 0;}
  .datechip{font-size:11px;color:var(--sub);background:#E2E5DC;padding:4px 12px;border-radius:999px;}

  .composer{display:flex;align-items:flex-end;gap:8px;padding:10px 12px;border-top:1px solid var(--line);background:var(--panel);}
  .composer textarea{flex:1;resize:none;max-height:120px;padding:11px 14px;border-radius:20px;border:1px solid var(--line);background:var(--bg);font-size:15px;color:var(--ink);line-height:1.4;}
  .send{width:44px;height:44px;border-radius:50%;flex:0 0 auto;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;}
  .notice{padding:16px;text-align:center;color:var(--faint);font-size:13px;border-top:1px solid var(--line);background:var(--panel);}

  #overlay:empty{display:none;}
  .sheet-bg{position:fixed;inset:0;background:rgba(30,33,28,.45);display:flex;align-items:flex-end;z-index:30;animation:fade .2s ease;}
  .sheet{width:100%;max-width:430px;margin:0 auto;background:var(--bg);border-top-left-radius:24px;border-top-right-radius:24px;padding:14px 22px 26px;max-height:92vh;overflow-y:auto;animation:pop .2s ease;}
  .grip{width:40px;height:4px;border-radius:4px;background:#CDD2C8;margin:0 auto 14px;}
  .sheet-title{margin:0 0 18px;font-size:19px;font-weight:800;}

  .setup{padding:38px 26px;}
  .setup h1{font-size:25px;font-weight:800;margin:0 0 8px;}
  .setup p{color:var(--sub);font-size:14px;line-height:1.7;}
  .setup ol{color:var(--ink);font-size:14px;line-height:1.95;padding-left:20px;}
  .setup code{background:#E2E5DC;padding:2px 6px;border-radius:6px;font-size:13px;}

  @keyframes pop{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  @media (prefers-reduced-motion:reduce){.sheet-bg,.sheet{animation:none;}}
</style>
</head>
<body>
  <div id="app"></div>
  <div id="overlay"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js';
import { getDatabase, ref, onValue, set, update, push, remove } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyCvm-dh3Pz54TQEDsod3D5qql4QwMvlj4U",
  authDomain: "chat-66ee5.firebaseapp.com",
  databaseURL: "https://chat-66ee5-default-rtdb.firebaseio.com",
  projectId: "chat-66ee5",
  storageBucket: "chat-66ee5.firebasestorage.app",
  messagingSenderId: "520177599317",
  appId: "1:520177599317:web:3e2fb1c1ab884ec022e5dc"
};

const EMOJIS = ['😀','😎','🐱','🐻','🦊','🐰','🐶','🌱','🍀','🌙','⭐','🍓','🍑','🎧','📚','⚡','👑','🎮','🪴','☕'];
const PASTELS = ['#F3C9B6','#CCDDC6','#CBD4F0','#F0D9BA','#E8C9E0','#BFE0DC','#E9D3C1','#D5DCC6','#F1C7CE','#C8E1EF'];
const LS_KEY = 'ieum_me_v1';

const S = { me:null, view:'people', profiles:{}, convs:{}, activeId:null, messages:[], ready:false };
let db = null, msgUnsub = null, selectedEmoji = '😀';

/* ----------------------------- utilities ----------------------------- */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function genId(){ return 'u' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function idOf(a,b){ return [a,b].sort().join('__'); }
function hashColor(s){ let h=0; s=String(s); for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return PASTELS[h%PASTELS.length]; }
function avatarHTML(emoji,id,size=46){ return `<div class="av" style="width:${size}px;height:${size}px;font-size:${Math.round(size*0.5)}px;background:${hashColor(id)}">${esc(emoji||'🙂')}</div>`; }
function fmtTime(t){ const d=new Date(t); let h=d.getHours(); const m=String(d.getMinutes()).padStart(2,'0'); const ap=h<12?'오전':'오후'; h=h%12||12; return `${ap} ${h}:${m}`; }
function fmtDate(t){ const d=new Date(t); const days=['일','월','화','수','목','금','토']; return `${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`; }
function timeAgo(t){ if(!t) return ''; const s=Math.floor((Date.now()-t)/1000); if(s<60) return '방금'; const m=Math.floor(s/60); if(m<60) return `${m}분 전`; const h=Math.floor(m/60); if(h<24) return `${h}시간 전`; return `${Math.floor(h/24)}일 전`; }
function loadMe(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)); }catch{ return null; } }
function saveMe(m){ localStorage.setItem(LS_KEY, JSON.stringify(m)); }
function clearMe(){ localStorage.removeItem(LS_KEY); }
function isConfigured(){ const c=firebaseConfig; return c && c.apiKey && !c.apiKey.includes('여기') && c.databaseURL && !c.databaseURL.includes('여기'); }

function memberList(c){ const m=c.members; if(Array.isArray(m)) return m; if(m && typeof m==='object') return Object.values(m); return []; }
function myConvs(){ return Object.values(S.convs).filter(c => c && memberList(c).includes(S.me.id)); }
function otherOf(c){ const oid=memberList(c).find(x => x!==S.me.id); return { id:oid, profile:S.profiles[oid]||null }; }
function incomingCount(){ if(!S.me) return 0; return myConvs().filter(c => c.status==='pending' && c.requestedBy!==S.me.id).length; }

/* ------------------------------ actions ------------------------------ */
async function createProfile(name, emoji, status){
  const id = genId();
  const m = { id, name:name.trim(), emoji, status:(status||'').trim() };
  saveMe(m); S.me = m; S.view = 'people';
  await set(ref(db,'profiles/'+id), { ...m, updatedAt:Date.now() });
  renderScreen();
}
async function saveProfile(name, emoji, status){
  const m = { ...S.me, name:name.trim(), emoji, status:(status||'').trim() };
  saveMe(m); S.me = m;
  await set(ref(db,'profiles/'+m.id), { ...m, updatedAt:Date.now() });
  closeSheet(); renderScreen();
}
async function resetProfile(){
  if(S.me) await remove(ref(db,'profiles/'+S.me.id));
  clearMe(); S.me=null; S.convs={}; selectedEmoji='😀'; S.view='people';
  closeSheet(); renderScreen();
}
async function requestChat(targetId){
  const cid = idOf(S.me.id, targetId);
  if(S.convs[cid]) return;
  await set(ref(db,'conversations/'+cid), { id:cid, members:[S.me.id,targetId], status:'pending', requestedBy:S.me.id, createdAt:Date.now(), lastT:Date.now(), lastText:'' });
}
async function acceptReq(cid){ await update(ref(db,'conversations/'+cid), { status:'accepted', lastT:Date.now() }); }
async function declineReq(cid){ await remove(ref(db,'conversations/'+cid)); await remove(ref(db,'messages/'+cid)); }

function openChat(cid){
  if(msgUnsub){ msgUnsub(); msgUnsub=null; }
  S.activeId=cid; S.messages=[]; S.view='chat';
  renderScreen();
  msgUnsub = onValue(ref(db,'messages/'+cid), snap => {
    const v = snap.val()||{};
    S.messages = Object.keys(v).map(k => ({ id:k, ...v[k] })).sort((a,b)=>(a.t||0)-(b.t||0));
    renderMessages(); scrollMsgsBottom();
  });
}
function leaveChat(){ if(msgUnsub){ msgUnsub(); msgUnsub=null; } S.activeId=null; S.messages=[]; S.view='chats'; renderScreen(); }

async function sendMessage(){
  const ta = document.getElementById('composer-input'); if(!ta) return;
  const text = ta.value.trim(); if(!text) return;
  const cid = S.activeId; if(!cid) return;
  ta.value=''; ta.style.height='auto';
  const t = Date.now();
  await push(ref(db,'messages/'+cid), { from:S.me.id, text, t });
  await update(ref(db,'conversations/'+cid), { lastT:t, lastText:text });
}

function switchTab(tab){ S.view=tab; renderScreen(); }
function submitProfile(){
  const name=(document.getElementById('f-name')?.value||'').trim();
  const status=(document.getElementById('f-status')?.value||'').trim();
  if(!name) return;
  if(S.me) saveProfile(name, selectedEmoji, status); else createProfile(name, selectedEmoji, status);
}
function pickEmoji(em){
  selectedEmoji = em;
  document.querySelectorAll('.emoji').forEach(x => x.classList.toggle('sel', x.dataset.emoji===em));
  const av = document.getElementById('form-avatar'); if(av) av.textContent = em;
}
function openEditSheet(){
  selectedEmoji = S.me.emoji;
  document.getElementById('overlay').innerHTML = `
    <div class="sheet-bg" data-action="closeSheet">
      <div class="sheet">
        <div class="grip"></div>
        <h2 class="sheet-title">내 프로필</h2>
        ${formHTML()}
      </div>
    </div>`;
}
function closeSheet(){ document.getElementById('overlay').innerHTML=''; }

/* ---------------------------- icons / parts -------------------------- */
const SVG_PEOPLE = a => `<svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${a?2.5:1.9}" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.1"/><path d="M3.5 19c0-3 2.4-5 5.5-5s5.5 2 5.5 5"/><path d="M16 6.3a2.9 2.9 0 0 1 0 5.4"/><path d="M17.6 14c2.2.4 3.9 2.2 3.9 5"/></svg>`;
const SVG_CHAT = a => `<svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${a?2.5:1.9}" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16a1.8 1.8 0 0 1 1.8 1.8v8.4A1.8 1.8 0 0 1 20 17H9.5L5 21v-4H4a1.8 1.8 0 0 1-1.8-1.8V6.8A1.8 1.8 0 0 1 4 5Z"/></svg>`;

function headerHTML(title){
  return `<div class="hdr">
    <div class="hdr-l"><span class="dot"></span><h1 class="title">${esc(title)}</h1></div>
    <button class="icon-btn" data-action="editProfile" aria-label="내 프로필">${avatarHTML(S.me.emoji,S.me.id,38)}</button>
  </div>`;
}
function tabsHTML(active){
  const inc = incomingCount();
  return `<div class="tabs">
    <button class="tab ${active==='people'?'active':''}" data-action="tab" data-tab="people"><span class="tab-ic">${SVG_PEOPLE(active==='people')}</span><span class="lab">사람들</span></button>
    <button class="tab ${active==='chats'?'active':''}" data-action="tab" data-tab="chats"><span class="tab-ic">${SVG_CHAT(active==='chats')}${inc>0?`<span class="badge">${inc}</span>`:''}</span><span class="lab">채팅</span></button>
  </div>`;
}
function formHTML(){
  const init = S.me;
  return `<div class="form">
    <div class="form-av-wrap"><div class="av" id="form-avatar" style="width:88px;height:88px;font-size:44px;background:${hashColor(init?init.id:'preview')}">${esc(selectedEmoji)}</div></div>
    <div>
      <p class="label">이모지 고르기</p>
      <div class="emoji-grid">${EMOJIS.map(e=>`<button class="emoji ${e===selectedEmoji?'sel':''}" data-action="pickEmoji" data-emoji="${e}">${e}</button>`).join('')}</div>
    </div>
    <div><p class="label">이름</p><input id="f-name" class="field" maxlength="16" placeholder="화면에 보일 이름" value="${esc(init?.name||'')}"></div>
    <div><p class="label">상태 메시지 <span class="opt">· 선택</span></p><input id="f-status" class="field" maxlength="40" placeholder="한 줄 소개" value="${esc(init?.status||'')}"></div>
    <button class="btn btn-primary btn-block" data-action="submitProfile">${init?'저장하기':'시작하기'}</button>
    ${init?`<button class="reset-link" data-action="resetProfile">프로필 삭제하고 처음부터</button>`:''}
  </div>`;
}

/* ------------------------------ screens ------------------------------ */
function setupScreen(){
  return `<div class="scroll sc setup">
    <h1>⚙️ 설정이 필요해요</h1>
    <p>이 파일을 텍스트 편집기로 열고, 맨 위 <code>firebaseConfig</code>에 본인 Firebase 프로젝트 정보를 붙여넣은 뒤 저장하고 새로고침하세요.</p>
    <ol>
      <li>Firebase 콘솔에서 프로젝트 만들기</li>
      <li><b>Realtime Database</b> 만들기 (테스트 모드로 시작)</li>
      <li>웹 앱(&lt;/&gt;) 추가 → <code>firebaseConfig</code> 복사</li>
      <li>이 파일 맨 위 <code>firebaseConfig</code>에 붙여넣기</li>
      <li>저장 후 새로고침</li>
    </ol>
    <p style="color:var(--faint)"><code>databaseURL</code> 항목이 비어있지 않은지 꼭 확인하세요 — Realtime Database를 만들면 자동으로 생깁니다.</p>
  </div>`;
}
function introScreen(){
  return `<div class="scroll sc intro">
    <div class="intro-logo"><span class="dot big"></span><h1 class="logo">이음</h1></div>
    <p class="intro-sub">프로필을 만들어 두면, 서로 찾아서 대화로 이어져요.</p>
    ${formHTML()}
  </div>`;
}
function rowPersonHTML(p){
  const cid = idOf(S.me.id,p.id), c = S.convs[cid];
  let action;
  if(!c) action = `<button class="btn btn-primary btn-sm" data-action="request" data-id="${p.id}">대화 신청</button>`;
  else if(c.status==='accepted') action = `<button class="btn btn-soft btn-sm" data-action="open" data-id="${cid}">대화하기</button>`;
  else if(c.requestedBy===S.me.id) action = `<span class="muted-tag">수락 대기</span>`;
  else action = `<button class="btn btn-ok btn-sm" data-action="accept" data-id="${cid}">수락</button>`;
  return `<div class="row">${avatarHTML(p.emoji,p.id)}<div class="row-main"><div class="name">${esc(p.name)}</div><div class="sub">${esc(p.status||' ')}</div></div>${action}</div>`;
}
function peopleScreen(){
  const others = Object.values(S.profiles).filter(p => p && p.id!==S.me.id);
  const list = others.length
    ? others.map(rowPersonHTML).join('')
    : `<div class="empty dashed">아직 아무도 없어요.<br>이 앱을 <b>게시(공유)</b>한 링크로 친구가 들어와<br>프로필을 만들면 여기에 나타나요.</div>`;
  return `${headerHTML('이음')}
    <div class="scroll sc">
      <div class="mycard">${avatarHTML(S.me.emoji,S.me.id)}<div class="row-main"><div class="name">${esc(S.me.name)} <span class="tag-me">· 나</span></div><div class="sub">${esc(S.me.status||'상태 메시지가 없어요')}</div></div><button class="btn btn-soft btn-sm" data-action="editProfile">편집</button></div>
      <p class="sect">사람들${others.length?` ${others.length}`:''}</p>
      ${list}
    </div>
    ${tabsHTML('people')}`;
}
function chatsScreen(){
  const mine = myConvs();
  const incoming = mine.filter(c => c.status==='pending' && c.requestedBy!==S.me.id);
  const accepted = mine.filter(c => c.status==='accepted').sort((a,b)=>(b.lastT||0)-(a.lastT||0));
  const outgoing = mine.filter(c => c.status==='pending' && c.requestedBy===S.me.id);

  let html = `${headerHTML('채팅')}<div class="scroll sc">`;

  if(incoming.length){
    html += `<p class="sect accent">받은 신청 ${incoming.length}</p>`;
    for(const c of incoming){ const o=otherOf(c);
      html += `<div class="row">${avatarHTML(o.profile?.emoji,o.id)}<div class="row-main"><div class="name">${esc(o.profile?.name||'알 수 없음')}</div><div class="sub">대화를 신청했어요</div></div>
        <button class="btn btn-ok btn-sm" data-action="accept" data-id="${c.id}">수락</button>
        <button class="btn btn-line btn-sm" data-action="decline" data-id="${c.id}">거절</button></div>`;
    }
  }

  html += `<p class="sect">대화</p>`;
  if(!accepted.length){
    html += `<div class="empty plain">아직 진행 중인 대화가 없어요.<br>사람들 탭에서 대화를 신청해보세요.</div>`;
  } else {
    for(const c of accepted){ const o=otherOf(c);
      html += `<button class="row" data-action="open" data-id="${c.id}">${avatarHTML(o.profile?.emoji,o.id)}<div class="row-main"><div style="display:flex;justify-content:space-between;gap:8px"><span class="name">${esc(o.profile?.name||'알 수 없음')}</span><span class="muted-tag" style="flex:0 0 auto">${timeAgo(c.lastT)}</span></div><div class="sub">${esc(c.lastText||'대화를 시작해보세요')}</div></div></button>`;
    }
  }

  if(outgoing.length){
    html += `<p class="sect faint" style="margin-top:18px">보낸 신청</p>`;
    for(const c of outgoing){ const o=otherOf(c);
      html += `<div class="row" style="opacity:.8;border:none;background:transparent;padding:10px 12px">${avatarHTML(o.profile?.emoji,o.id,38)}<div class="row-main name" style="font-weight:500">${esc(o.profile?.name||'알 수 없음')}</div><span class="muted-tag">수락 대기 중</span></div>`;
    }
  }

  html += `</div>${tabsHTML('chats')}`;
  return html;
}
function chatScreen(){
  const c = S.convs[S.activeId]; if(!c) return chatsScreen();
  const o = otherOf(c);
  const composer = c.status==='accepted'
    ? `<div class="composer"><textarea id="composer-input" rows="1" placeholder="메시지 입력"></textarea><button class="send" data-action="send" aria-label="보내기"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13M13 6l6 6-6 6"/></svg></button></div>`
    : `<div class="notice">아직 수락 전이에요.</div>`;
  return `<div class="chat-hdr">
      <button class="back" data-action="leaveChat" aria-label="뒤로"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
      ${avatarHTML(o.profile?.emoji,o.id,38)}
      <div style="min-width:0"><div class="chat-name">${esc(o.profile?.name||'알 수 없음')}</div>${o.profile?.status?`<div class="chat-status">${esc(o.profile.status)}</div>`:''}</div>
    </div>
    <div class="msgs" id="msgs"></div>
    ${composer}`;
}

/* ------------------------------ rendering ---------------------------- */
function renderMessages(){
  const box = document.getElementById('msgs'); if(!box) return;
  const c = S.convs[S.activeId]; const o = c ? otherOf(c) : {};
  if(!S.messages.length){
    box.innerHTML = `<div class="msg-hint">${esc(o.profile?.name||'상대')}님과 연결됐어요. 먼저 인사를 건네보세요.</div>`;
    return;
  }
  let html='', lastDay=null;
  for(const m of S.messages){
    const day = new Date(m.t).toDateString();
    if(day!==lastDay){ html += `<div class="datechip-row"><span class="datechip">${fmtDate(m.t)}</span></div>`; lastDay=day; }
    const mine = m.from===S.me.id;
    html += `<div class="msg-row ${mine?'r':'l'}">${mine?`<span class="time">${fmtTime(m.t)}</span>`:''}<div class="bubble ${mine?'mine':''}">${esc(m.text)}</div>${!mine?`<span class="time">${fmtTime(m.t)}</span>`:''}</div>`;
  }
  box.innerHTML = html;
}
function scrollMsgsBottom(){ const box=document.getElementById('msgs'); if(box) box.scrollTop=box.scrollHeight; }
function setupComposer(){
  const ta = document.getElementById('composer-input'); if(!ta) return;
  ta.addEventListener('input', () => { ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,120)+'px'; });
  ta.addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); } });
}
function renderScreen(){
  const app = document.getElementById('app');
  let inner;
  if(!S.ready) inner = setupScreen();
  else if(!S.me) inner = introScreen();
  else if(S.view==='chat') inner = chatScreen();
  else if(S.view==='chats') inner = chatsScreen();
  else inner = peopleScreen();
  app.innerHTML = `<div class="app">${inner}</div>`;
  if(S.ready && S.me && S.view==='chat'){ renderMessages(); scrollMsgsBottom(); setupComposer(); }
}

/* --------------------------- event delegation ------------------------ */
document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]'); if(!el) return;
  const a = el.dataset.action;
  if(a==='closeSheet'){ if(e.target.closest('.sheet')) return; closeSheet(); return; }
  const id = el.dataset.id;
  switch(a){
    case 'request': requestChat(id); break;
    case 'accept': acceptReq(id); break;
    case 'decline': declineReq(id); break;
    case 'open': openChat(id); break;
    case 'leaveChat': leaveChat(); break;
    case 'tab': switchTab(el.dataset.tab); break;
    case 'editProfile': openEditSheet(); break;
    case 'submitProfile': submitProfile(); break;
    case 'resetProfile': resetProfile(); break;
    case 'pickEmoji': pickEmoji(el.dataset.emoji); break;
    case 'send': sendMessage(); break;
  }
});

/* -------------------------------- boot ------------------------------- */
if(isConfigured()){
  try{
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    S.ready = true;
    S.me = loadMe();
    if(S.me) set(ref(db,'profiles/'+S.me.id), { ...S.me, updatedAt:Date.now() });
    onValue(ref(db,'profiles'), snap => { S.profiles = snap.val()||{}; if(S.me && S.view!=='chat') renderScreen(); });
    onValue(ref(db,'conversations'), snap => { S.convs = snap.val()||{}; if(S.me && S.view!=='chat') renderScreen(); });
  }catch(err){ console.error('Firebase init failed:', err); S.ready=false; }
}
renderScreen();
</script>
</body>
</html>
